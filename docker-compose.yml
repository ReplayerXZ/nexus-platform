version: '3.8'

services:

  # ================================
  # AUTH SERVICE
  # ================================
  auth-service:
    build: ./services/auth-service
    container_name: nexus-auth
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-migrator:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${AUTH_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5



# ================================
  # USER SERVICE
  # ================================
  user-service:
    build: ./services/user-service
    container_name: nexus-user
    ports:
      - "${USER_PORT}:${USER_PORT}"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${USER_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # AUTH MIGRATOR
  # ================================
  auth-migrator:
    build: ./services/auth-service
    container_name: nexus-auth-migrator
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    command: npm run migrate:up
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

# ================================
  # NOTIFICATION SERVICE
  # ================================
  notification-service:
    build: ./services/notification-service
    container_name: nexus-notification
    ports:
      - "${NOTIFICATION_PORT}:${NOTIFICATION_PORT}"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${NOTIFICATION_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # RABBITMQ
  # ================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexus-rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "15672:15672"       # management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ================================
  # MONGODB
  # ================================
  mongodb:
    image: mongo:7-jammy
    container_name: nexus-mongodb
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ================================
  # WORKER SERVICE
  # ================================
  worker-service:
    build: ./services/worker-service
    container_name: nexus-worker
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ================================
  # POSTGRESQL
  # ================================
  postgres:
    image: postgres:15-alpine
    container_name: nexus-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ================================
  # REDIS
  # ================================
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  mongodb_data: